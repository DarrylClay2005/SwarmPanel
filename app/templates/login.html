<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SwarmPanel — Sign in</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="login-body">

  <!-- Animated background orbs -->
  <div class="login-bg" aria-hidden="true">
    <div class="login-bg-orb login-bg-orb-1"></div>
    <div class="login-bg-orb login-bg-orb-2"></div>
    <div class="login-bg-orb login-bg-orb-3"></div>
  </div>

  <main class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🎵</div>
      <h1>SwarmPanel</h1>
    </div>
    <p class="login-subtitle">Sign in to access bot telemetry and controls.</p>

    {% if error %}
    <div class="login-error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="stack">
      <div class="login-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required placeholder="admin" />
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="login-submit">Sign in</button>
    </form>
  </main>
</body>
</html>
